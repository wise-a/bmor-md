<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMOR Markdown Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- Math Support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style id="dynamic-fonts"></style>
    <style id="custom-theme-vars"></style>
    <style>
        :root {
            --text: #191102;
            --background: #fbf9f6;
            --primary: #eea629;
            --secondary: #daf584;
            --accent: #98f14f;
            --border: #e5e1da;
            --preview-font: 'Inter', sans-serif;
            --code-font: 'Fira Code', monospace;
        }

        body.theme-electric {
            --text: #0b0700;
            --background: #fbf9f6;
            --primary: #ff9901;
            --secondary: #67e4ff;
            --accent: #433bff;
            --border: #e5e1da;
        }

        body.theme-natural {
            --text: #181511;
            --background: #fbf9f6;
            --primary: #aa8e65;
            --secondary: #d0bc9d;
            --accent: #c9ab7d;
            --border: #e5e1da;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Themed Layout Elements */
        header {
            background-color: var(--background);
            border-bottom: 1px solid var(--border);
            opacity: 0.95;
            transition: all 0.3s ease;
        }

        #outline-pane {
            background-color: var(--background);
            border-right: 1px solid var(--border);
            width: 240px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #editor-pane {
            background-color: var(--background);
            border-right: 1px solid var(--border);
            opacity: 0.98;
            transition: all 0.3s ease;
        }

        .pane-header {
            border-bottom: 1px solid var(--border);
            background-color: var(--background);
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        #preview-pane {
            background-color: var(--background);
            transition: all 0.3s ease;
        }

        .editor-textarea {
            font-family: var(--code-font);
            resize: none;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
            background-color: transparent;
            color: var(--text);
        }

        /* Comprehensive Markdown Styles */
        #preview-content {
            line-height: 1.7;
            color: var(--text);
            font-family: var(--preview-font);
        }

        #preview-content h1 { font-size: 2.5rem; font-weight: 800; border-bottom: 4px solid var(--secondary); padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        #preview-content h2 { font-size: 1.75rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; color: var(--primary); }
        #preview-content h3 { font-size: 1.4rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        #preview-content h4 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; color: var(--text); }
        #preview-content h5 { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: var(--text); opacity: 0.9; }
        #preview-content h6 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: var(--text); opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }
        
        #preview-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        #preview-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        #preview-content ul ul, #preview-content ol ol, #preview-content ul ol, #preview-content ol ul { margin-bottom: 0; }
        #preview-content li { margin-bottom: 0.25rem; }

        /* Task List Cleanup */
        .task-list-item { list-style-type: none !important; margin-left: -1rem !important; display: flex !important; align-items: flex-start !important; gap: 0.5rem; }
        .task-list-item input[type="checkbox"] { margin-top: 0.4rem; accent-color: var(--primary); cursor: default; }

        #preview-content blockquote {
            border-left: 4px solid var(--primary);
            background-color: var(--secondary);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        #preview-content table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; border: 1px solid var(--border); }
        #preview-content th, #preview-content td { padding: 0.75rem; border: 1px solid var(--border); text-align: left; }
        #preview-content th { background-color: var(--secondary); font-weight: 700; }

        #preview-content pre { 
            background: #fff; padding: 1.25rem; border-radius: 12px; margin: 1.5rem 0; overflow-x: auto; 
            border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            font-family: var(--code-font) !important;
        }
        #preview-content code { 
            font-family: var(--code-font) !important; background-color: var(--secondary);
            padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em;
        }
        #preview-content pre code { background-color: transparent; padding: 0; }

        #preview-content a { color: var(--primary); text-decoration: underline; text-underline-offset: 2px; }
        #preview-content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

        /* Footnotes */
        .footnotes { font-size: 0.85em; opacity: 0.8; margin-top: 3rem; border-top: 2px solid var(--secondary); padding-top: 1.5rem; }
        .footnote-ref a { text-decoration: none !important; font-weight: bold; background: var(--secondary); padding: 0 4px; border-radius: 4px; font-size: 0.8em; margin-left: 2px; color: var(--primary); }

        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        .transition-pane { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hidden-pane { flex: 0 0 0% !important; opacity: 0; pointer-events: none; overflow: hidden; }
        
        .btn-action { background-color: var(--background); border: 1px solid var(--border); color: var(--text); transition: all 0.2s; }
        .btn-action:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
        .logo-box { background-color: var(--primary); transition: all 0.3s ease; }

        #typography-panel {
            position: fixed; top: 70px; right: 2rem; width: 320px; max-height: calc(100vh - 100px);
            overflow-y: auto; background: var(--background); border: 1px solid var(--border);
            border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); z-index: 50;
            display: none; color: var(--text);
        }
        #typography-panel.visible { display: block; animation: slideIn 0.2s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .font-upload-btn { font-size: 0.7rem; padding: 6px 8px; border: 1px dashed var(--border); border-radius: 6px; cursor: pointer; text-align: center; }
        .font-upload-btn:hover { border-color: var(--primary); background: var(--secondary); }
        .font-upload-btn.loaded { background: var(--secondary); border-style: solid; border-color: var(--primary); }

        #outline-content div:hover {
            background-color: var(--secondary);
            color: var(--primary);
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="h-16 flex items-center justify-between px-8 backdrop-blur-md z-10">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 logo-box rounded-xl flex items-center justify-center shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m8 7 4-4 4 4"/><path d="m8 17 4 4 4-4"/></svg>
            </div>
            <h1 class="text-xl font-extrabold tracking-tight" style="color: var(--text)">B<span style="color: var(--primary)">MOR</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="toggleOutline()" id="outlineBtn" class="btn-action px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Outline
            </button>
            <button onclick="toggleTypography()" class="btn-action px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h3.22L12 22h-3.22l1.9-12.62z"/><path d="M9.5 15.5h5"/><path d="M20 16a2 2 0 0 1-2 2h-1c-1.1 0-2-1.1-2-2v-1a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2z"/><path d="M4 16a2 2 0 0 1-2 2H1c-1.1 0-2-1.1-2-2v-1a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2z"/></svg>
                Settings
            </button>
            <button onclick="cycleTheme()" class="btn-action px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold min-w-[120px]">
                <div id="theme-icon-container">
                    <svg id="icon-sunny" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>
                    <svg id="icon-electric" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2-2 10h9L11 22l2-10H5L13 2z"/></svg>
                    <svg id="icon-natural" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a8 8 0 0 1-8 8"/><path d="M13 22c3 0 7-1 7-8"/></svg>
                    <svg id="icon-custom" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <span id="theme-label">Sunny</span>
            </button>

            <div class="h-6 w-[1px] bg-[var(--border)] mx-1"></div>

            <button onclick="triggerUpload()" class="btn-action px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload
            </button>
            <button onclick="downloadFile()" class="btn-action px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export
            </button>
            <button onclick="toggleZen()" id="zenBtn" class="p-2.5 btn-action rounded-lg" title="Zen Mode">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            </button>
        </div>
    </header>

    <!-- Settings Panel -->
    <div id="typography-panel" class="p-6 custom-scroll">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Studio Settings</h3>
        
        <div class="mb-8 p-4 bg-black/5 rounded-xl border border-[var(--border)]">
            <label class="block text-[10px] font-black uppercase tracking-tighter mb-3 opacity-50">Custom Palette Upload</label>
            <div class="space-y-3">
                <button onclick="document.getElementById('palette-upload').click()" class="w-full font-upload-btn py-3 bg-white/50 hover:bg-white transition-colors">
                    Upload .txt Palette File
                </button>
                <textarea id="palette-input" class="w-full h-24 p-2 text-[10px] font-mono border border-[var(--border)] bg-white/30 rounded-lg outline-none focus:border-primary resize-none" placeholder="Paste format:&#10;--text: #191102;&#10;--background: #fbf9f6;..."></textarea>
                <button onclick="applyManualPalette()" class="w-full py-2 bg-slate-900 text-white text-[10px] font-bold uppercase rounded-lg hover:bg-black transition-colors">Apply Manual Palette</button>
            </div>
            <input type="file" id="palette-upload" class="hidden" accept=".txt,.css" onchange="handlePaletteUpload(this)">
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-black uppercase tracking-tighter mb-2 opacity-50">Main Font Library</label>
            <select id="google-font-picker" onchange="changeGoogleFont(this.value)" class="w-full p-2 border border-[var(--border)] rounded-lg text-sm outline-none focus:border-primary bg-white/50">
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-black uppercase tracking-tighter mb-2 opacity-50">Monospace Font Library</label>
            <select id="google-mono-picker" onchange="changeMonoFont(this.value)" class="w-full p-2 border border-[var(--border)] rounded-lg text-sm outline-none focus:border-primary bg-white/50 font-mono">
            </select>
        </div>

        <div class="space-y-6 pt-4 border-t border-[var(--border)]">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-tighter mb-2 opacity-50">Custom Main Font Files</label>
                <div class="grid grid-cols-2 gap-2">
                    <div class="font-upload-btn" id="btn-regular" onclick="document.getElementById('upload-regular').click()">Regular</div>
                    <div class="font-upload-btn" id="btn-bold" onclick="document.getElementById('upload-bold').click()">Bold</div>
                    <div class="font-upload-btn" id="btn-italic" onclick="document.getElementById('upload-italic').click()">Italic</div>
                    <div class="font-upload-btn" id="btn-bolditalic" onclick="document.getElementById('upload-bolditalic').click()">Bold Italic</div>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-tighter mb-2 opacity-50">Custom Monospace Font File</label>
                <div class="font-upload-btn w-full py-3" id="btn-mono" onclick="document.getElementById('upload-mono').click()">Upload Custom Mono File</div>
            </div>

            <button onclick="resetFonts()" class="w-full py-2 text-[10px] font-black uppercase tracking-widest text-red-500 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-100">Factory Reset Studio</button>
        </div>

        <input type="file" id="upload-regular" class="hidden" accept=".ttf,.otf,.woff,.woff2" onchange="handleFontUpload(this, 'normal', '400', 'main')">
        <input type="file" id="upload-bold" class="hidden" accept=".ttf,.otf,.woff,.woff2" onchange="handleFontUpload(this, 'normal', '700', 'main')">
        <input type="file" id="upload-italic" class="hidden" accept=".ttf,.otf,.woff,.woff2" onchange="handleFontUpload(this, 'italic', '400', 'main')">
        <input type="file" id="upload-bolditalic" class="hidden" accept=".ttf,.otf,.woff,.woff2" onchange="handleFontUpload(this, 'italic', '700', 'main')">
        <input type="file" id="upload-mono" class="hidden" accept=".ttf,.otf,.woff,.woff2" onchange="handleFontUpload(this, 'normal', '400', 'mono')">
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <div id="outline-pane" class="flex flex-col hidden-pane transition-pane overflow-hidden">
            <div class="pane-header px-6 py-3 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Outline</div>
            <div id="outline-content" class="flex-1 overflow-y-auto p-4 custom-scroll text-sm space-y-1"></div>
        </div>

        <div id="editor-pane" class="flex-1 flex flex-col transition-pane">
            <div class="pane-header px-6 py-3 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] flex justify-between items-center">
                <span class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-[var(--primary)] transition-colors"></span>
                    Source Editor
                </span>
                <span id="char-count">0 characters</span>
            </div>
            <textarea id="markdown-input" spellcheck="false" class="editor-textarea flex-1 p-10 outline-none focus:ring-0 text-lg custom-scroll leading-relaxed" placeholder="Type something amazing..."></textarea>
        </div>

        <div id="preview-pane" class="flex-1 flex flex-col transition-pane">
            <div class="pane-header px-6 py-3 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Live Preview</div>
            <div id="preview-container" class="flex-1 overflow-y-auto p-10 custom-scroll">
                <div id="preview-content" class="max-w-3xl mx-auto"></div>
            </div>
        </div>
    </main>

    <input type="file" id="file-upload" accept=".md,.txt" class="hidden">
    <div id="toast" class="px-8 py-3.5 rounded-2xl shadow-xl text-sm font-bold flex items-center gap-3">
        <span id="toast-text"></span>
    </div>

    <script>
        window.onload = () => {
            const markdownInput = document.getElementById('markdown-input');
            const previewContent = document.getElementById('preview-content');
            const charCount = document.getElementById('char-count');
            const fileUpload = document.getElementById('file-upload');
            const themes = ['sunny', 'electric', 'natural', 'custom'];
            let currentThemeIndex = 0;

            marked.setOptions({ gfm: true, breaks: true });

            function renderMath(text) {
                // Normalize and handle common copy-paste artifacts like \+ and \=
                text = text.replace(/\\([\+\=\-\*])/g, '$1');
                text = text.replace(/\u00a0/g, ' ');

                // Block Math
                text = text.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
                    try { return `<div class="katex-display">${katex.renderToString(p1.trim(), { displayMode: true, throwOnError: false })}</div>`; }
                    catch (e) { return match; }
                });
                // Inline Math
                text = text.replace(/\$([^\$\n]+?)\$/g, (match, p1) => {
                    try { return katex.renderToString(p1.trim(), { displayMode: false, throwOnError: false }); }
                    catch (e) { return match; }
                });
                return text;
            }

            function renderFootnotes(text) {
                const fnRegex = /\\?\[\^([^\]]+)\]/g;
                const defRegex = /^\\?\[\^([^\]]+)\]:\s*([\s\S]+?)(?=\n\\?\[\^|\n\n|\n$|$)/gm;
                let notes = [];
                
                // Extract definitions
                text = text.replace(defRegex, (m, id, content) => { 
                    notes.push({ id, content: content.trim() }); 
                    return ""; 
                });

                // Replace references
                text = text.replace(fnRegex, (m, id) => {
                    return `<sup class="footnote-ref"><a href="#fn-${id}" id="ref-${id}">${id}</a></sup>`;
                });

                if (notes.length > 0) {
                    let html = '<div class="footnotes"><hr><ol>';
                    notes.forEach(n => { 
                        html += `<li id="fn-${n.id}">${marked.parseInline(n.content)} <a href="#ref-${n.id}">↩</a></li>`; 
                    });
                    text += html + '</ol></div>';
                }
                return text;
            }

            function processTaskLists(html) {
                // Expanded support for [x], [s], [?], etc.
                return html.replace(/<li>\s*\[([xXsS\?\s])\]\s*/g, (m, char) => {
                    const isChecked = ['x', 'X', 's', 'S'].includes(char) ? 'checked' : '';
                    return `<li class="task-list-item"><input type="checkbox" disabled ${isChecked}> `;
                });
            }

            window.updatePreview = () => {
                let val = markdownInput.value || "";
                val = val.replace(/\u00a0/g, ' '); 
                try {
                    let processed = renderMath(val);
                    processed = renderFootnotes(processed);
                    let html = marked.parse(processed);
                    html = processTaskLists(html);
                    
                    previewContent.innerHTML = html;
                    charCount.textContent = `${val.length} characters`;
                    document.querySelectorAll('pre code').forEach(block => {
                        if (typeof hljs !== 'undefined') hljs.highlightElement(block);
                    });
                    localStorage.setItem('bmor_md_content', val);
                    updateOutline();
                } catch (e) { console.error(e); }
            }

            function updateOutline() {
                const lines = markdownInput.value.split('\n');
                let html = '';
                lines.forEach(line => {
                    const match = line.match(/^(#{1,6})\s+(.+)$/);
                    if (match) {
                        const level = match[1].length;
                        const text = match[2].trim();
                        html += `<div onclick="scrollToHeading('${text.replace(/'/g, "\\'")}')" class="cursor-pointer py-1.5 px-3 rounded-md transition-all truncate text-xs font-medium" style="margin-left: ${(level-1)*12}px; opacity: ${1-(level-1)*0.15}">${text}</div>`;
                    }
                });
                document.getElementById('outline-content').innerHTML = html || '<div class="text-[10px] opacity-40 px-2">No headings</div>';
            }

            window.scrollToHeading = (text) => {
                const heads = previewContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
                for (let h of heads) {
                    if (h.textContent.trim() === text) {
                        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        h.style.color = 'var(--primary)';
                        setTimeout(() => h.style.color = '', 1000);
                        break;
                    }
                }
            };

            window.toggleOutline = () => {
                const op = document.getElementById('outline-pane');
                const b = document.getElementById('outlineBtn');
                const hide = op.classList.toggle('hidden-pane');
                b.style.backgroundColor = !hide ? 'var(--primary)' : '';
                b.style.color = !hide ? 'white' : '';
            };

            window.toggleTypography = () => document.getElementById('typography-panel').classList.toggle('visible');
            
            window.handlePaletteUpload = (input) => {
                const f = input.files[0]; if (!f) return;
                const r = new FileReader(); r.onload = (e) => { 
                    document.getElementById('palette-input').value = e.target.result; 
                    processPalette(e.target.result); 
                }; r.readAsText(f);
            };

            window.applyManualPalette = () => processPalette(document.getElementById('palette-input').value);

            function processPalette(text) {
                const p = {};
                text.split('\n').forEach(l => { 
                    const m = l.match(/--(text|background|primary|secondary|accent):\s*(#[0-9a-fA-F]{3,6});/); 
                    if (m) p[m[1]] = m[2]; 
                });
                if (Object.keys(p).length < 5) return showToast("Palette incomplete!");
                localStorage.setItem('bmor_custom_palette', JSON.stringify(p));
                applyCustomThemeVars(p);
                applyTheme('custom');
                currentThemeIndex = 3;
                showToast("Palette Applied");
            }

            function applyCustomThemeVars(p) {
                let css = `body.theme-custom { `;
                for (const [k, v] of Object.entries(p)) { css += `--${k}: ${v}; `; }
                css += `--border: ${p.secondary || p.primary}44; } `;
                css += `body.theme-custom header, body.theme-custom #editor-pane, body.theme-custom .pane-header, body.theme-custom #outline-pane { border-color: var(--border) !important; }`;
                document.getElementById('custom-theme-vars').innerHTML = css;
            }

            window.changeGoogleFont = (f) => { 
                document.body.style.setProperty('--preview-font', `'${f}', sans-serif`); 
                loadFont('main', f); 
                localStorage.setItem('bmor_md_font', f); 
            };
            window.changeMonoFont = (f) => { 
                document.body.style.setProperty('--code-font', `'${f}', monospace`); 
                loadFont('mono', f); 
                localStorage.setItem('bmor_md_mono_font', f); 
            };

            function loadFont(type, n) {
                const id = `font-link-${type}`;
                let l = document.getElementById(id) || document.createElement('link');
                l.id = id; l.rel = 'stylesheet'; document.head.appendChild(l);
                l.href = `https://fonts.googleapis.com/css2?family=${n.replace(/ /g, '+')}:ital,wght@0,400;0,700;1,400;1,700&display=swap`;
            }

            window.handleFontUpload = (i, s, w, t) => {
                const f = i.files[0]; if (!f) return;
                const r = new FileReader(); r.onload = (e) => {
                    const k = t === 'mono' ? 'font_mono' : `font_${s}_${w}`;
                    let d = JSON.parse(localStorage.getItem('bmor_custom_fonts') || '{}');
                    d[k] = e.target.result; localStorage.setItem('bmor_custom_fonts', JSON.stringify(d));
                    applyCustomFonts();
                }; r.readAsDataURL(f);
            };

            function applyCustomFonts() {
                const d = JSON.parse(localStorage.getItem('bmor_custom_fonts') || '{}');
                let css = '';
                if (Object.keys(d).length > 0) {
                    for (const [k, v] of Object.entries(d)) {
                        if (k === 'font_mono') { 
                            css += `@font-face { font-family: 'CustomMono'; src: url('${v}'); } :root { --code-font: 'CustomMono', monospace !important; } `; 
                        } else { 
                            const [_, s, w] = k.split('_'); 
                            css += `@font-face { font-family: 'CustomPreview'; src: url('${v}'); font-weight: ${w}; font-style: ${s}; } `; 
                        }
                    }
                    if (d.font_normal_400 || d.font_normal_700) document.body.style.setProperty('--preview-font', "'CustomPreview', sans-serif");
                    document.getElementById('dynamic-fonts').innerHTML = css;
                }
                const map = {'font_normal_400': 'btn-regular', 'font_normal_700': 'btn-bold', 'font_italic_400': 'btn-italic', 'font_italic_700': 'btn-bolditalic', 'font_mono': 'btn-mono'};
                Object.entries(map).forEach(([k, id]) => { const b = document.getElementById(id); if (b) b.classList.toggle('loaded', !!d[k]); });
            }

            window.applyTheme = (t) => {
                themes.forEach(x => document.body.classList.remove(`theme-${x}`));
                if (t !== 'sunny') document.body.classList.add(`theme-${t}`);
                document.getElementById('theme-label').textContent = t.charAt(0).toUpperCase() + t.slice(1);
                themes.forEach(x => {
                    const icon = document.getElementById(`icon-${x}`);
                    if (icon) icon.classList.toggle('hidden', x !== t);
                });
                localStorage.setItem('bmor_md_theme', t);
            };

            window.cycleTheme = () => {
                currentThemeIndex = (currentThemeIndex + 1) % themes.length;
                if (themes[currentThemeIndex] === 'custom' && !localStorage.getItem('bmor_custom_palette')) currentThemeIndex = 0;
                applyTheme(themes[currentThemeIndex]);
                showToast(`Theme: ${themes[currentThemeIndex].toUpperCase()}`);
            };

            window.downloadFile = () => {
                const b = new Blob([markdownInput.value], { type: 'text/markdown' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'bmor.md'; a.click();
            };

            window.triggerUpload = () => fileUpload.click();
            fileUpload.addEventListener('change', (e) => {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader(); r.onload = (e) => { markdownInput.value = e.target.result; window.updatePreview(); }; r.readAsText(f);
            });

            window.toggleZen = () => {
                const pp = document.getElementById('preview-pane');
                const op = document.getElementById('outline-pane');
                const mi = document.getElementById('markdown-input');
                const zb = document.getElementById('zenBtn');
                
                const isZen = pp.classList.toggle('hidden-pane');
                op.classList.add('hidden-pane');
                
                mi.classList.toggle('max-w-7xl', isZen);
                mi.classList.toggle('mx-auto', isZen);
                
                zb.style.backgroundColor = isZen ? 'var(--primary)' : '';
                zb.style.color = isZen ? 'white' : '';
                showToast(isZen ? "Zen Mode Active" : "View Restored");
            };

            function showToast(m) {
                const t = document.getElementById('toast');
                const tt = document.getElementById('toast-text');
                if (!t || !tt) return;
                tt.textContent = m;
                t.style.background = 'var(--text)'; t.style.color = 'var(--background)';
                t.classList.add('visible'); 
                setTimeout(() => t.classList.remove('visible'), 3000);
            }

            const g1 = ["Inter", "Roboto", "Open Sans", "Montserrat", "Lato", "Poppins", "Playfair Display", "Merriweather", "Lora", "Fira Sans", "Raleway", "Quicksand", "Dancing Script", "Spectral"];
            const g2 = ["Fira Code", "Source Code Pro", "Roboto Mono", "JetBrains Mono", "Space Mono", "IBM Plex Mono"];
            const p1 = document.getElementById('google-font-picker');
            g1.sort().forEach(f => { const o = document.createElement('option'); o.value = o.textContent = f; p1.appendChild(o); });
            const p2 = document.getElementById('google-mono-picker');
            g2.sort().forEach(f => { const o = document.createElement('option'); o.value = o.textContent = f; p2.appendChild(o); });

            const st = localStorage.getItem('bmor_md_theme') || 'sunny';
            const sp = localStorage.getItem('bmor_custom_palette');
            if (sp) applyCustomThemeVars(JSON.parse(sp));
            applyTheme(st);
            const sf = localStorage.getItem('bmor_md_font') || 'Inter';
            p1.value = sf; changeGoogleFont(sf);
            const sm = localStorage.getItem('bmor_md_mono_font') || 'Fira Code';
            p2.value = sm; changeMonoFont(sm);
            applyCustomFonts();

            markdownInput.value = localStorage.getItem('bmor_md_content') || `# Welcome to BMOR\n\n#### Level 4 Heading\n##### Level 5 Heading\n###### Level 6 Heading\n\n- [x] Done\n- [s] Working\n- [ ] Pending\n\nMath: $a^2 + b^2 = c^2$\n\nFootnote test [^1]\n\n[^1]: Footnote here.`;
            window.updatePreview();
            markdownInput.addEventListener('input', window.updatePreview);
            markdownInput.addEventListener('keydown', e => { 
                if (e.key === 'Tab') { 
                    e.preventDefault(); 
                    const s = markdownInput.selectionStart; 
                    markdownInput.value = markdownInput.value.substring(0, s) + "  " + markdownInput.value.substring(markdownInput.selectionEnd); 
                    markdownInput.selectionStart = markdownInput.selectionEnd = s + 2; 
                }
            });
            window.resetFonts = () => { localStorage.clear(); location.reload(); };
        };
    </script>
</body>
</html>
